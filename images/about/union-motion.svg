<svg width="150" height="139" viewBox="0 0 150 139" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated web code cursor icon">
  <style>
    :root {
      --icon-ink: #050505;
      --icon-blue: #00a8ff;
      --icon-pink: #ff6bd6;
    }

    #union-icon {
      animation: union-float 3.4s ease-in-out infinite;
      transform-box: view-box;
      transform-origin: 75px 70px;
    }

    #union-base {
      animation: union-fill-pulse 3.4s ease-in-out infinite;
      fill: var(--icon-ink);
    }

    #union-trace {
      animation: union-trace 3.4s cubic-bezier(.22, 1, .36, 1) infinite;
      fill: none;
      pathLength: 1;
      stroke: var(--icon-ink);
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      stroke-linecap: square;
      stroke-linejoin: round;
      stroke-width: 2;
    }

    #cursor-nudge {
      animation: cursor-nudge 3.4s ease-in-out infinite;
      fill: var(--icon-ink);
      opacity: .9;
      transform-box: view-box;
      transform-origin: 108px 112px;
    }

    #screen-scan {
      animation: screen-scan 3.4s ease-in-out infinite;
      fill: var(--icon-blue);
      opacity: 0;
      transform-box: view-box;
    }

    .spark {
      animation: spark-pop 3.4s steps(1, end) infinite;
      opacity: 0;
    }

    .spark-one { animation-delay: .35s; fill: var(--icon-blue); }
    .spark-two { animation-delay: .55s; fill: var(--icon-pink); }
    .spark-three { animation-delay: .8s; fill: var(--icon-blue); }

    @keyframes union-trace {
      0% { opacity: .9; stroke-dashoffset: 1; }
      28% { opacity: .9; stroke-dashoffset: 0; }
      56%, 100% { opacity: 0; stroke-dashoffset: 0; }
    }

    @keyframes union-fill-pulse {
      0%, 24% { opacity: .15; }
      34%, 74% { opacity: 1; }
      100% { opacity: .82; }
    }

    @keyframes union-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @keyframes cursor-nudge {
      0%, 42%, 100% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      50% { transform: translate(2px, -2px) rotate(-1deg); opacity: .95; }
      62% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
    }

    @keyframes screen-scan {
      0%, 22% { opacity: 0; transform: translateY(-18px); }
      30%, 48% { opacity: .55; }
      62%, 100% { opacity: 0; transform: translateY(77px); }
    }

    @keyframes spark-pop {
      0%, 24%, 100% { opacity: 0; }
      30%, 39% { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      #union-icon,
      #union-base,
      #union-trace,
      #cursor-nudge,
      #screen-scan,
      .spark {
        animation: none;
      }

      #union-base { opacity: 1; }
      #union-trace,
      #cursor-nudge,
      #screen-scan,
      .spark { opacity: 0; }
    }
  </style>

  <defs>
    <clipPath id="screen-clip">
      <rect x="4.35" y="20.45" width="141.14" height="80.85"/>
    </clipPath>
    <clipPath id="cursor-clip">
      <path d="M78 80H136V139H94L78 80Z"/>
    </clipPath>
  </defs>

